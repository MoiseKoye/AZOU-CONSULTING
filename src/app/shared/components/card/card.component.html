<div class="bg-gray-50 p-6 rounded-lg shadow-sm hover:shadow-md transition-all duration-300 text-center group cursor-pointer">
  <div class="w-16 h-16 bg-gold/10 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-gold transition-colors duration-300">
    <i [class]="'fas ' + icon + ' text-2xl text-gold group-hover:text-black transition-colors duration-300'"></i>
  </div>
  <h3 class="text-xl font-bold text-navy mb-2">{{ title }}</h3>
  <p class="text-gray-600">{{ description }}</p>
</div>
