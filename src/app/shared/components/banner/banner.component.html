<section class="relative w-full min-h-[90vh] bg-cover bg-center bg-no-repeat flex items-center"
         [style.backgroundImage]="'url(' + backgroundImage + ')'">
  
  <!-- Overlay sombre -->
  <div class="absolute inset-0 bg-navy/50"></div>
  
  <!-- Contenu -->
  <div class="relative z-10 container-custom text-center text-white py-20">
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6" [innerHTML]="title"></h1>
    <p class="text-lg md:text-xl text-gray-200 max-w-3xl mx-auto mb-8 leading-relaxed">
      {{ subtitle }}
    </p>
    <div class="flex flex-wrap gap-4 justify-center">
      <a [routerLink]="buttonLink">
        <app-button type="dark">{{ buttonText }}</app-button>
      </a>
      <a [routerLink]="secondaryButtonLink">
        <app-button type="dark">{{ secondaryButtonText }}</app-button>
      </a>
    </div>
  </div>
</section>
